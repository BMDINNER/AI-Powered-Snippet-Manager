services:
  postgres_snippet:
    image: postgres:15-alpine
    container_name: snippet_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snippet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_snippet_data:/var/lib/postgresql/data
    networks:
      - platform_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.5.13
    container_name: snippet_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    networks:
      - platform_network
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      ollama serve &
      sleep 10 &&
      if ! ollama list | grep -q 'tinyllama'; then
        echo 'Downloading tinyllama model (~1.1GB)...' &&
        ollama pull tinyllama &&
        echo 'Model download complete!'
      else
        echo 'tinyllama model already exists, skipping download.'
      fi &&
      echo 'Ollama is ready!' &&
      wait
      "
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snippet_backend
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://postgres:postgres@postgres_snippet:5432/snippet_db
      - AUTH_SERVICE_URL=http://auth-service:3001
      - PROJECT_ID=${PROJECT_ID}
      - API_KEY=${API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=tinyllama
      - CORS_ORIGIN=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      postgres_snippet:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - platform_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend:3002
        - VITE_AUTH_URL=http://auth-service:3001
        - VITE_API_KEY=${API_KEY}
        - VITE_PROJECT_ID=${PROJECT_ID}
    container_name: snippet_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:3002
      - VITE_AUTH_URL=http://auth-service:3001
    depends_on:
      - backend
    networks:
      - platform_network
    restart: unless-stopped

volumes:
  postgres_snippet_data:
  ollama_data:

networks:
  platform_network:
    external: true